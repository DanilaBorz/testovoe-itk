services:
  postgres:
    image: postgres:16-alpine
    container_name: wallet-db
    env_file:
      - config.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16-alpine
    container_name: wallet-db-test
    profiles:
      - test
    env_file:
      - config.test.env
    ports:
      - "5433:5432"
    volumes:
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: wallet-app
    ports:
      - "8080:8080"
    env_file:
      - config.env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
